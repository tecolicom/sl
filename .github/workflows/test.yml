name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev

      - name: Install Perl dependencies
        working-directory: src
        run: |
          curl -sL https://cpanmin.us | sudo perl - --notest --installdeps .
          perl -MText::VisualWidth::PP -e1
          perl -MGetopt::EX::termcolor -e1

      - name: Build binaries
        working-directory: src
        run: |
          make sl-2010 sl-2023 sl-2026
          if make sl-1985 2>/dev/null; then
            echo "sl-1985 built successfully"
          else
            echo "::warning::sl-1985 build failed (expected on some platforms)"
          fi

      - name: Install bash (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Shell script syntax check
        run: |
          bash -n src/sl-screen.sh
          bash -n src/sl-sweep.sh
          # sl requires bash 4+ (declare -A)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            $(brew --prefix)/bin/bash -n src/sl
          else
            bash -n src/sl
          fi

      - name: Basic option tests
        working-directory: src
        run: |
          ./sl --version
          ./sl --version | grep -q '^v'
